name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check (tsc --noEmit)
        run: npm run lint

  test:
    name: Test (Node ${{ matrix.node }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Test (vitest)
        run: npm test

  security:
    name: Audit & Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Dependency Audit (production tree — what consumers install)
        run: npm audit --omit=dev --audit-level=high
      - name: Dependency Audit (full tree — advisory only, non-blocking)
        run: npm audit --audit-level=high || true
      - name: License Check
        run: >
          npx --yes license-checker --production
          --failOn "GPL-2.0-only;GPL-2.0-or-later;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0-only;AGPL-3.0-or-later;SSPL-1.0;BUSL-1.1;Commons-Clause"

  build-validate:
    name: Build & Validate Package
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Verify dist output exists
        run: |
          test -f dist/index.js   || (echo "dist/index.js missing"   && exit 1)
          test -f dist/cli.js     || (echo "dist/cli.js missing"     && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)
      - name: Validate Exports (publint)
        run: npx --yes publint
      - name: Validate Type Declarations (attw)
        run: npx --yes @arethetypeswrong/cli --pack . --ignore-rules no-resolution cjs-resolves-to-esm
      - name: Dry-run pack
        run: npm pack --dry-run
      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx > sbom-cyclonedx.json || true
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom-cyclonedx.json
          if-no-files-found: ignore
