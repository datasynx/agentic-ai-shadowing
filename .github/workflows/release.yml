name: Release

on:
  push:
    branches: [main, beta, alpha]
  workflow_dispatch:

# A dedicated concurrency lane, separate from CI. cancel-in-progress is false,
# so rapid pushes to main queue release runs instead of cancelling an in-flight
# publish. This is what lets semantic-release actually finish on a busy branch.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Skip the auto-generated "[skip ci]" release commit to avoid loops.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # npm provenance attestation (Sigstore OIDC)
    env:
      # Reading the secret into env lets the publish step gate on it
      # (the `secrets` context is not available in step-level `if`).
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22' # semantic-release v25 requires Node >= 22.14
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Verify (lint, test, build)
        run: |
          npm run lint
          npm test
          npm run build
      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx > sbom-cyclonedx.json || true
      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom-cyclonedx.json
          if-no-files-found: ignore
      - name: Semantic Release
        if: env.HAS_NPM_TOKEN == 'true'
        run: npx --yes semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Release skipped (no NPM_TOKEN)
        if: env.HAS_NPM_TOKEN != 'true'
        run: echo "::notice::NPM_TOKEN secret not set — skipping npm release."
      # Publish the server.json manifest to the official MCP Registry (#32).
      # Runs only when semantic-release actually cut a release (tag at HEAD);
      # non-blocking so a registry outage can never fail the npm release.
      # On failure, emit a ::warning:: annotation so the failure is visible on
      # the run summary — continue-on-error alone swallowed the first failed
      # publish entirely (#36).
      - name: Publish to MCP Registry
        if: env.HAS_NPM_TOKEN == 'true'
        continue-on-error: true
        run: |
          if [ -z "$(git tag --points-at HEAD)" ]; then
            echo "::notice::No release tag at HEAD — skipping MCP Registry publish."
            exit 0
          fi
          trap 'echo "::warning title=MCP Registry publish failed::mcp-publisher did not publish $(git tag --points-at HEAD) — the npm release is unaffected. Re-publish manually or with the next release."' ERR
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
