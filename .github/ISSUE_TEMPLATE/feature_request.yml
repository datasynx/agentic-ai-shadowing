name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Include CLI/MCP/config shape if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Fit with project principles
      options:
        - label: Works local-first (no new external service beyond the Claude API)
        - label: Respects privacy (no new PII surface, or redaction covered)
